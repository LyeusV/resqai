services:
  api:
    container_name: resqai-api
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./dataset:/app/dataset
      - ./data:/app/data
      - ./models:/app/models
    environment:
      - PYTHONUNBUFFERED=1
    command: uvicorn resqai.api:app --host 0.0.0.0 --port 8000 --reload