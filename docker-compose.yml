services:
  api:
    container_name: resqai-api
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./dataset:/app/dataset
      - ./data:/app/data
      - ./models:/app/models
    environment:
      - PYTHONUNBUFFERED=1
    command: uvicorn resqai.api:app --host 0.0.0.0 --port 8000 --reload

  web:
    container_name: resqai-web
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - api
    command: npm run dev -- --host 0.0.0.0